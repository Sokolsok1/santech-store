<form id="productForm">
<input type="text" class="form-control mb-2" placeholder="Название" id="name">
<input type="text" class="form-control mb-2" placeholder="SKU" id="sku">
<input type="text" class="form-control mb-2" placeholder="Бренд" id="brand">
<input type="text" class="form-control mb-2" placeholder="Страна" id="country">
<input type="number" class="form-control mb-2" placeholder="Цена" id="price">
<input type="number" class="form-control mb-2" placeholder="Остаток" id="stock">
<input type="text" class="form-control mb-2" placeholder="Размер" id="size">

<h5>Характеристики</h5>
<div id="attributes"></div>
<button type="button" class="btn btn-secondary" onclick="addAttribute()">+ Добавить характеристику</button>

<button class="btn btn-success mt-3">Сохранить</button>
</form>
