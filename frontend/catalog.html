<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сантехника - Каталог</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container mt-4">
    <h1>Каталог товаров</h1>

    <a href="index.html" class="btn btn-secondary mb-3">← На главную</a>

    <div class="row mb-3">
      <!-- Фильтры -->
      <div class="col-md-3">
        <h5>Фильтры</h5>
        <div id="filters"></div>
        <button id="applyFilters" class="btn btn-primary btn-sm mt-2">Применить</button>
        <button id="resetFilters" class="btn btn-secondary btn-sm mt-2">Сбросить фильтры</button>
      </div>

      <!-- Список товаров -->
      <div class="col-md-9">
        <div id="products" class="row"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
